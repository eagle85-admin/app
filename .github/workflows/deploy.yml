name: Build and Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: self-hosted

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Build Docker image
      run: |
        docker build -t 192.168.56.30:5000/myapp:latest .

    - name: Push image
      run: |
        docker push 192.168.56.30:5000/myapp:latest

    - name: Deploy to K8s
      run: |
        kubectl set image deployment/myapp myapp=192.168.56.30:5000/myapp:latest
